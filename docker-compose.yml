version: '3.8'

services:
  ml-env:
    build: ./docker
    ports:
      - "8888:8888"
    volumes:
      - .:/app
      - ./data:/app/data
    environment:
      - JUPYTER_ENABLE_LAB=yes
  
  train:
    build: ./docker
    command: python train.py
    volumes:
      - .:/app
      - ./data:/app/data
      - ./models:/app/models